```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendataan Alumni</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table, th, td{
    border:1px solid #ccc;
}

th{
    background:#007bff;
    color:white;
}

th, td{
    padding:10px;
    text-align:left;
}
</style>
</head>

<body>

<div class="container">

    <h2>Form Pendataan Alumni</h2>

    <form id="dataForm">

        <label>Nama</label>
        <input type="text" id="nama" required>

        <label>Alamat</label>
        <textarea id="alamat" required></textarea>

        <label>No HP</label>
        <input type="tel" id="nohp" required>

        <label>Alumni Tahun</label>
        <input type="number" id="tahun" required>

        <button type="submit">Simpan Data</button>

    </form>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Alamat</th>
                <th>No HP</th>
                <th>Alumni Tahun</th>
            </tr>
        </thead>
        <tbody id="tabelData"></tbody>
    </table>

</div>

<script>

// GANTI DENGAN URL WEB APP APPS SCRIPT ANDA
const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw5yBlm4iHYuBl2-kSWF2dScoEAMgVEX7y4IK9bIVP_8totrGQpVgy2Tp0QZITAvKTe/exec";

let nomor = 1;

document.getElementById("dataForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const nama = document.getElementById("nama").value;
    const alamat = document.getElementById("alamat").value;
    const nohp = document.getElementById("nohp").value;
    const tahun = document.getElementById("tahun").value;

    const data = {
        nama: nama,
        alamat: alamat,
        nohp: nohp,
        tahun: tahun
    };

    try {

        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        if(response.ok){

            const tabel = document.getElementById("tabelData");

            const row = tabel.insertRow();

            row.innerHTML = `
                <td>${nomor++}</td>
                <td>${nama}</td>
                <td>${alamat}</td>
                <td>${nohp}</td>
                <td>${tahun}</td>
            `;

            alert("Data berhasil disimpan ke Google Sheets");

            document.getElementById("dataForm").reset();

        } else {
            alert("Gagal menyimpan data");
        }

    } catch(error) {

        console.error(error);
        alert("Terjadi kesalahan saat mengirim data");

    }

});

</script>

</body>
</html>
